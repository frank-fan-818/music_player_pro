<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
    <meta name="theme-color" content="#0C0C10" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%23F5C542'/><stop offset='100%' stop-color='%23D4A020'/></linearGradient></defs><circle cx='50' cy='50' r='48' fill='%230C0C10' stroke='url(%23g)' stroke-width='2'/><path d='M38 65V28l28-5v32' fill='none' stroke='url(%23g)' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='34' cy='65' r='5' fill='url(%23g)'/><circle cx='62' cy='57' r='5' fill='url(%23g)'/></svg>" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>MusicPlayer Pro</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0C0C10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.35s ease-out;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="bg-obsidian-900 text-text-primary antialiased overscroll-none">
    <!-- splash screen -->
    <div id="splash">
      <svg width="88" height="88" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#F5C542"/>
            <stop offset="100%" stop-color="#D4A020"/>
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="none" stroke="url(#sg)" stroke-width="2" opacity="0.25"/>
        <circle cx="50" cy="50" r="46" fill="none" stroke="url(#sg)" stroke-width="1" stroke-dasharray="8 4" opacity="0.12">
          <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
        </circle>
        <path d="M38 65V28l28-5v32" fill="none" stroke="url(#sg)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="34" cy="65" r="5" fill="url(#sg)"/>
        <circle cx="62" cy="57" r="5" fill="url(#sg)"/>
      </svg>
      <div style="margin-top:24px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:18px;font-weight:700;color:#F5C542;letter-spacing:0.04em;">MusicPlayer Pro</div>
      <div style="margin-top:8px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;color:#6A6A70;">离线音乐播放器</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
